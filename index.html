<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA DATABASE PRO v5.1</title>
    <style>
        :root { --bg: #0d0d0f; --card: #16161a; --neon: #00ff87; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --danger: #ff4444; --text: #ffffff; --blue: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1100px; }
        header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; cursor: pointer; }
        
        /* Tabela Cores */
        .pos-1 { background: rgba(255, 215, 0, 0.1) !important; color: var(--gold); }
        .pos-last { background: rgba(255, 68, 68, 0.1) !important; }
        
        #adminPanel { display: none; background: #1a1a1e; padding: 15px; border-radius: 10px; border: 1px solid var(--neon); margin-bottom: 20px; }
        .btn { padding: 10px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; font-size: 10px; margin: 2px; }
        .btn-green { background: var(--neon); color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon); color: #000; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        th { background: #222; color: #888; font-size: 10px; padding: 12px; text-transform: uppercase; }
        td { padding: 12px 8px; border-bottom: 1px solid #222; text-align: center; font-size: 14px; }
        .nome-player { text-align: left; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .team-logo { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; background: #000; }

        /* Galeria Estilizada */
        .gallery-section { display: none; flex-direction: column; gap: 30px; width: 100%; }
        .season-block { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; }
        .season-title { color: var(--neon); font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .podium-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        
        .podium-card { background: #1c1c21; border-radius: 10px; padding: 15px; text-align: center; border: 1px solid #222; position: relative; }
        .podium-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .medal { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .podium-1 { border-top: 4px solid var(--gold); }
        .podium-2 { border-top: 4px solid var(--silver); }
        .podium-3 { border-top: 4px solid var(--bronze); }
        .podium-last { border-top: 4px solid var(--danger); opacity: 0.8; }

        .row-edit { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; background: #25252b; padding: 10px; border-radius: 5px; align-items: center; }
        .row-edit input { background: #000; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="acesso()">
        <h1>FIFA <span style="color:var(--neon)">DATABASE</span></h1>
        <p style="font-size:10px; color:#666">v5.1 - HALL DA FAMA & VERGONHA</p>
    </header>

    <div id="adminPanel">
        <button class="btn btn-blue" onclick="exportar()">📥 Backup</button>
        <button class="btn btn-blue" onclick="importar()">📤 Restaurar</button>
        <div id="editor"></div>
        <button onclick="add()" class="btn btn-green" style="width:100%">+ Novo Jogador</button>
        <button onclick="salvar()" class="btn btn-green" style="width:100%; margin-top:15px; height:40px">Salvar Alterações</button>
        <button onclick="encerrar()" class="btn" style="background:#400; color:#f66; width:100%; margin-top:5px">Fechar Temporada</button>
    </div>

    <div class="tabs">
        <button id="tabelaBtn" class="tab-btn active" onclick="tab('tabela')">TABELA</button>
        <button id="galeriaBtn" class="tab-btn" onclick="tab('galeria')">GALERIA</button>
    </div>

    <div id="contentTabela">
        <select id="view" onchange="mudarView(this.value)" style="width:100%; padding:12px; background:#16161a; color:var(--neon); border:1px solid #333; border-radius:8px; margin-bottom:15px;"></select>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>POS</th><th style="text-align:left">JOGADOR</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th style="color:var(--gold)">FORÇA</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="contentGaleria" class="gallery-section"></div>
</div>

<script>
    const KEY = 'fifa_ultimate_v51';
    let db = JSON.parse(localStorage.getItem(KEY)) || { atual: [], historico: [] };
    let modo = 'atual';

    function acesso() { if(prompt("Senha:") === '123') document.getElementById('adminPanel').style.display='block'; }

    function tab(t) {
        document.getElementById('contentTabela').style.display = t === 'tabela' ? 'block' : 'none';
        document.getElementById('contentGaleria').style.display = t === 'galeria' ? 'flex' : 'none';
        document.getElementById('tabelaBtn').className = t === 'tabela' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('galeriaBtn').className = t === 'galeria' ? 'tab-btn active' : 'tab-btn';
        if(t === 'galeria') renderGaleria();
    }

    function render() {
        const menu = document.getElementById('view');
        menu.innerHTML = '<option value="atual">Temporada Atual</option>';
        db.historico.forEach((h, i) => menu.innerHTML += `<option value="${i}">${h.nome}</option>`);

        let lista = modo === 'atual' ? [...db.atual] : [...db.historico[modo].dados];
        lista.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        const body = document.getElementById('tbody');
        body.innerHTML = lista.map((j, i) => {
            let pts = (j.v*3)+j.e;
            let forca = ((j.gp * 3.5) - (j.gc * 2.5)).toFixed(1);
            let classe = (i === 0) ? "pos-1" : (i === lista.length - 1 && lista.length > 2 ? "pos-last" : "");
            return `<tr class="${classe}">
                <td>${i+1}º</td>
                <td class="nome-player"><img src="${j.foto || 'https://cdn-icons-png.flaticon.com/512/53/53254.png'}" class="team-logo">${j.nome}</td>
                <td style="color:var(--neon)">${pts}</td><td>${j.v}</td><td>${j.e}</td><td>${j.d}</td>
                <td>${j.gp}</td><td>${j.gc}</td><td style="color:var(--gold)">${forca}</td>
            </tr>`;
        }).join('');

        document.getElementById('editor').innerHTML = db.atual.map((j, i) => `
            <div class="row-edit">
                <input style="width:100px" type="text" value="${j.nome}" onchange="db.atual[${i}].nome=this.value">
                <input style="flex:1" type="text" placeholder="URL Escudo" value="${
